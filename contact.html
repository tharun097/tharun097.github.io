<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – Tharun Kumar Reddy</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script>
        (function () {
            // emailjs.init("U_Mpsv-Eaylg6xAhv");
            emailjs.init("A22AabE7ECZALe1pa");
        })();
    </script>

    <style>
        /* Page Title */
        h1 {
            color: #7ecbff;
            font-size: 36px;
            text-align: center;
            margin-bottom: 25px;
            text-shadow: 0 0 12px #7ecbff, 0 0 25px #3fa4ff;
            animation: fadeIn 1.5s ease;
        }

        section {
            max-width: 850px;
            margin: 50px auto;
            padding: 40px;
            background: rgba(22, 32, 68, 0.75);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(126, 203, 255, 0.25);
            box-shadow: 0 0 20px rgba(126, 203, 255, 0.07);
            animation: slideUp 1.2s ease;
        }

        label {
            color: #dce7ff;
            font-size: 18px;
            margin-bottom: 8px;
            display: block;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 25px;
            border-radius: 8px;
            border: 1px solid rgba(126, 203, 255, 0.25);
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: #7ecbff;
            box-shadow: 0 0 12px #7ecbff;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
            color: #0a1025;
            background: #7ecbff;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s ease;
            box-shadow: 0 0 10px #7ecbff;
        }

        button:hover {
            background: #a6dcff;
            box-shadow: 0 0 15px #a6dcff;
        }

        /* Contact links section */
        .contact-links {
            margin-top: 30px;
            text-align: center;
        }

        .contact-links a {
            display: inline-block;
            margin: 10px 15px;
            color: #7ecbff;
            font-size: 28px;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .contact-links a:hover {
            color: #ffffff;
            text-shadow: 0 0 10px #7ecbff;
        }

        /* Success/Failure Messages */
        #statusMessage {
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        .success {
            color: #7effa0;
            text-shadow: 0 0 12px #5dff92;
        }

        .error {
            color: #ff7e7e;
            text-shadow: 0 0 12px #ff4d4d;
        }

        /* Navigation Bar */
        nav {
            background: #141c35;
            padding: 18px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(126, 203, 255, 0.1);
        }

        nav a {
            color: #7ecbff;
            margin: 0 15px;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s ease;
        }

        nav a:hover {
            color: #ffffff;
            text-shadow: 0 0 8px #7ecbff;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="skills.html">Skills</a>
        <a href="experience.html">Experience</a>
        <a href="projects.html">Projects</a>
        <a href="education.html">Education</a>
        <a href="certifications.html">Certifications</a>
        <a href="achievements.html">Achievements</a>
        <a href="languages.html">Languages</a>
        <a href="contact.html">Contact</a>
    </nav>

    <!-- Contact Section -->
    <section>
        <h1>Let's Connect</h1>

        <form id="contactForm">
            <label>Name</label>
            <input type="text" id="name" required>

            <label>Company</label>
            <input type="text" id="company" required>

            <label>Email</label>
            <input type="email" id="email" required>

            <label>Message</label>
            <textarea id="message" placeholder="Write your message here..." required></textarea>

            <button type="submit">Submit</button>
        </form>

        <div id="statusMessage"></div>

        <!-- Icons Only Contact Links -->
        <div class="contact-links">
            <a href="mailto:btharunkumarreddy39@gmail.com">📧Mail</a>
            <a href="https://www.linkedin.com/in/tharun-kumar-reddy-b-146a84248/" target="_blank">🔗LinkedIn</a>
            <a href="https://github.com/tharun097" target="_blank">💻GitHub</a>
            <a href="tel:+917993663637">📞Call</a>
        </div>
    </section>

    <script>
        document.getElementById("contactForm").addEventListener("submit", function(event) {
            event.preventDefault();

            const templateParams = {
                name: document.getElementById("name").value,
                company: document.getElementById("company").value,
                email: document.getElementById("email").value,
                message: document.getElementById("message").value
            };

            emailjs.send("service_0h9x3lb", "template_9cnkmfn", templateParams)
                .then(function () {
                    document.getElementById("statusMessage").innerHTML =
                        "<p class='success'>✔ Message sent successfully!</p>";
                }, function () {
                    document.getElementById("statusMessage").innerHTML =
                        "<p class='error'>✖ Failed to send message.</p>";
                });
        });
    </script>

</body>

</html>
