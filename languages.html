<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Languages – Tharun Kumar Reddy</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Page Title */
        h1 {
            color: #7ecbff;
            font-size: 36px;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 12px #7ecbff, 0 0 25px #3fa4ff;
            animation: fadeIn 1.5s ease;
        }

        /* Main Section */
        section {
            max-width: 850px;
            margin: 60px auto;
            background: rgba(22, 32, 68, 0.75);
            padding: 40px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(126, 203, 255, 0.3);
            box-shadow: 0 0 20px rgba(126, 203, 255, 0.05);
            animation: slideUp 1.2s ease;
        }

        /* Language Row */
        .lang-row {
            margin: 22px 0;
            padding: 15px 20px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(126, 203, 255, 0.1);
            box-shadow: 0 0 8px rgba(126, 203, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lang-name {
            font-size: 20px;
            color: #dce7ff;
            font-weight: 600;
        }

        .proficiency-bar {
            width: 55%;
            height: 10px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            border: 1px solid rgba(126, 203, 255, 0.2);
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3fa4ff, #7ecbff);
            box-shadow: 0 0 10px #7ecbff;
            animation: growBar 1.8s ease forwards;
        }

        /* Individual proficiency levels */
        .eng { width: 95%; }
        .tel { width: 100%; }
        .kan { width: 65%; }

        /* Navigation Bar */
        nav {
            background: #141c35;
            padding: 18px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(126, 203, 255, 0.1);
        }

        nav a {
            color: #7ecbff;
            margin: 0 15px;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s ease;
        }

        nav a:hover {
            color: #ffffff;
            text-shadow: 0 0 8px #7ecbff;
        }

        /* Animations */
        @keyframes growBar {
            from { width: 0; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="skills.html">Skills</a>
        <a href="experience.html">Experience</a>
        <a href="projects.html">Projects</a>
        <a href="education.html">Education</a>
        <a href="certifications.html">Certifications</a>
        <a href="achievements.html">Achievements</a>
        <a href="languages.html">Languages</a>
        <a href="contact.html">Contact</a>
    </nav>

    <!-- Languages Section -->
    <section>
        <h1>Languages</h1>

        <div class="lang-row">
            <div class="lang-name">English (Professional Proficiency)</div>
            <div class="proficiency-bar">
                <div class="bar-fill eng"></div>
            </div>
        </div>

        <div class="lang-row">
            <div class="lang-name">Telugu (Native)</div>
            <div class="proficiency-bar">
                <div class="bar-fill tel"></div>
            </div>
        </div>

        <div class="lang-row">
            <div class="lang-name">Kannada (Conversational)</div>
            <div class="proficiency-bar">
                <div class="bar-fill kan"></div>
            </div>
        </div>

    </section>

</body>

</html>
